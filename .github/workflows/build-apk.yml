name: Build APK (Capacitor)

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # ── 1. Kod olish ──────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4

      # ── 2. Java 17 ────────────────────────────────────────
      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      # ── 3. Node.js ────────────────────────────────────────
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      # ── 4. Android SDK ────────────────────────────────────
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install SDK packages
        run: |
          sdkmanager "platforms;android-34" "build-tools;34.0.0" "platform-tools"

      # ── 5. NPM install ────────────────────────────────────
      - name: Install dependencies
        run: npm install

      # ── 6. Capacitor Android platform qo'shish ────────────
      - name: Add Android platform
        run: |
          npx cap add android
          npx cap sync android

      # ── 7. App nomi va package customize ─────────────────
      - name: Customize Android app
        run: |
          # App nomi o'zbek tilida
          sed -i 's|app_name">.*<|app_name">TestBase<|g' \
            android/app/src/main/res/values/strings.xml || true

          # Screenshot himoya - FLAG_SECURE
          cat > /tmp/MainActivityPatch.py << 'PYEOF'
          import re, sys

          path = 'android/app/src/main/java/uz/testbase/psixologiya/MainActivity.java'
          try:
              with open(path, 'r') as f:
                  content = f.read()

              # Add FLAG_SECURE import
              if 'WindowManager' not in content:
                  content = content.replace(
                      'import com.getcapacitor.BridgeActivity;',
                      'import com.getcapacitor.BridgeActivity;\nimport android.view.WindowManager;'
                  )

              # Add FLAG_SECURE in onCreate
              if 'FLAG_SECURE' not in content:
                  content = content.replace(
                      'super.onCreate(savedInstanceState);',
                      'super.onCreate(savedInstanceState);\n        getWindow().setFlags(WindowManager.LayoutParams.FLAG_SECURE, WindowManager.LayoutParams.FLAG_SECURE);'
                  )

              with open(path, 'w') as f:
                  f.write(content)
              print("FLAG_SECURE added successfully")
          except Exception as e:
              print(f"Warning: {e}")
          PYEOF
          python3 /tmp/MainActivityPatch.py

      # ── 8. Gradle build ───────────────────────────────────
      - name: Build debug APK
        working-directory: android
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon --stacktrace

      # ── 9. APK ni artifact sifatida saqlash ───────────────
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: TestBase-APK
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 90

      # ── 10. Release yaratish (faqat main branch) ──────────
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ github.run_number }}
          name: "TestBase v${{ github.run_number }}"
          body: |
            ## 📱 TestBase APK
            - 621 ta savol-javob
            - Offline ishlaydi
            - Screenshot himoyali
            
            **O'rnatish:** APK ni yuklab, telefoningizga o'rnating.
          files: android/app/build/outputs/apk/debug/app-debug.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
