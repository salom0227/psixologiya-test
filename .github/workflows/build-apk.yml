name: Build APK (Capacitor)

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - uses: android-actions/setup-android@v3
      - run: sdkmanager "platforms;android-34" "build-tools;34.0.0" "platform-tools"
      - run: npm install
      - run: npx cap add android && npx cap sync android
      - name: Add FLAG_SECURE
        run: |
          MAIN=$(find android -name "MainActivity.java" | head -1)
          python3 - << PYEOF
path = "$MAIN"
with open(path) as f: c = f.read()
if "WindowManager" not in c:
    c = c.replace("import com.getcapacitor.BridgeActivity;", "import com.getcapacitor.BridgeActivity;\nimport android.view.WindowManager;")
if "FLAG_SECURE" not in c:
    c = c.replace("super.onCreate(savedInstanceState);", "super.onCreate(savedInstanceState);\n        getWindow().setFlags(WindowManager.LayoutParams.FLAG_SECURE, WindowManager.LayoutParams.FLAG_SECURE);")
with open(path, "w") as f: f.write(c)
print("FLAG_SECURE OK")
PYEOF
      - name: Build APK
        working-directory: android
        run: chmod +x gradlew && ./gradlew assembleDebug --no-daemon
      - uses: actions/upload-artifact@v4
        with:
          name: TestBase-APK-v${{ github.run_number }}
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 90
